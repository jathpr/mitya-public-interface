name: i18n smoke tests

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm ci
      - name: Build and start server (background)
        run: |
          npm run build
          nohup npm run start &>/tmp/next-start.log &
          # wait for server to start
          sleep 3
      - name: Run smoke i18n tests
        run: node ./scripts/smoke-i18n.js
      - name: Capture server logs
        if: failure()
        run: tail -n 200 /tmp/next-start.log
